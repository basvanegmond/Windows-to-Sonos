<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Hi-Fi</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="brand-mark">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">Local Hi-Fi</span>
        <span class="brand-sub mono">windows &rarr; sonos</span>
      </div>
    </div>

    <nav class="side-nav">
      <button class="nav-item active" data-view="albums">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Albums
      </button>
      <button class="nav-item" data-view="tracks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
        All Tracks
      </button>
      <button class="nav-item" id="rescan-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-2.6-6.3"/><polyline points="21 3 21 9 15 9"/></svg>
        Rescan Library
      </button>
    </nav>

    <div class="speakers-panel">
      <div class="panel-label mono">SPEAKERS</div>
      <div id="speaker-list" class="speaker-list">
        <div class="skeleton speaker-skeleton"></div>
        <div class="skeleton speaker-skeleton"></div>
        <div class="skeleton speaker-skeleton"></div>
      </div>
    </div>

    <div class="server-info mono" id="server-info"></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <header class="main-header">
      <h1 id="view-title">Albums</h1>
      <div class="header-actions">
        <input type="search" id="search" class="search" placeholder="Search library&hellip;" autocomplete="off">
        <button class="icon-btn" id="yt-toggle" title="Stream from YouTube">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="5" width="19" height="14" rx="4"/><polygon points="10 9 16 12 10 15" fill="currentColor" stroke="none"/></svg>
        </button>
        <button class="icon-btn" id="queue-toggle" title="Show queue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="6" x2="14" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="11" y2="18"/><polygon points="17 9 22 12 17 15" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
    </header>

    <div id="content" class="content">
      <div class="album-grid" id="skeleton-grid">
        <div class="skeleton album-skeleton"></div>
        <div class="skeleton album-skeleton"></div>
        <div class="skeleton album-skeleton"></div>
        <div class="skeleton album-skeleton"></div>
        <div class="skeleton album-skeleton"></div>
        <div class="skeleton album-skeleton"></div>
      </div>
    </div>
  </main>

  <!-- ============ QUEUE DRAWER ============ -->
  <aside class="queue-drawer" id="queue-drawer">
    <div class="queue-head">
      <span class="panel-label mono">QUEUE</span>
      <button class="icon-btn" id="queue-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div id="queue-list" class="queue-list">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><line x1="4" y1="6" x2="14" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="11" y2="18"/><polygon points="17 9 22 12 17 15"/></svg>
        <p>Queue is empty.<br>Play an album or add tracks.</p>
      </div>
    </div>
  </aside>

  <!-- ============ PLAYER BAR ============ -->
  <footer class="player" id="player">
    <div class="player-now">
      <div class="player-art" id="player-art">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/></svg>
      </div>
      <div class="player-meta">
        <span class="player-title" id="player-title">Nothing playing</span>
        <span class="player-artist" id="player-artist">Select a speaker, then play something</span>
        <span class="player-quality mono" id="player-quality"></span>
      </div>
    </div>

    <div class="player-center">
      <div class="transport">
        <button class="icon-btn" id="btn-shuffle" title="Shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="m4 4 5 5"/></svg>
        </button>
        <button class="icon-btn" id="btn-prev" title="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="19 20 9 12 19 4"/><rect x="5" y="4" width="2" height="16"/></svg>
        </button>
        <button class="play-btn" id="btn-play" title="Play / Pause">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" id="icon-play"><polygon points="8 5 19 12 8 19"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" id="icon-pause" style="display:none"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
        </button>
        <button class="icon-btn" id="btn-next" title="Next">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 4 15 12 5 20"/><rect x="17" y="4" width="2" height="16"/></svg>
        </button>
        <button class="icon-btn" id="btn-repeat" title="Repeat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="seek-row">
        <span class="time mono" id="time-now">0:00</span>
        <div class="seek-bar" id="seek-bar"><div class="seek-fill" id="seek-fill"></div></div>
        <span class="time mono" id="time-total">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <span class="target-label mono" id="target-label">no speaker</span>
      <button class="icon-btn" id="mini-toggle" title="Mini player (always on top)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="4" width="19" height="16" rx="2"/><rect x="11.5" y="11" width="8" height="6" rx="1" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
  </footer>

</div>

<!-- ============ YOUTUBE OVERLAY ============ -->
<div class="yt-backdrop" id="yt-backdrop" hidden>
  <div class="yt-panel">
    <div class="yt-head">
      <div class="yt-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="5" width="19" height="14" rx="4"/><polygon points="10 9 16 12 10 15" fill="currentColor" stroke="none"/></svg>
        <span>Stream from YouTube</span>
      </div>
      <button class="icon-btn" id="yt-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="yt-input-row">
      <input type="url" id="yt-url" class="yt-url" placeholder="Paste a YouTube URL&hellip;" autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" id="yt-play">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="8 5 19 12 8 19"/></svg>
        Play
      </button>
      <button class="btn btn-ghost" id="yt-queue-add" title="Add to queue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Queue
      </button>
    </div>
    <div class="yt-status mono" id="yt-status"></div>
    <div class="panel-label mono" style="padding:0">PREVIOUSLY FETCHED</div>
    <div class="yt-list" id="yt-list">
      <div class="empty-state"><p>Nothing fetched yet.<br>Paste a URL above to stream its audio.</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="art-canvas" width="48" height="48" hidden></canvas>

<script src="app.js"></script>
</body>
</html>
